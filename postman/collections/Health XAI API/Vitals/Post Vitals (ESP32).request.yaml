$kind: http-request
name: 'Post Vitals (ESP32)'
method: POST
url: '{{baseUrl}}/api/vitals'
order: 1000
description: Receive vitals data from ESP32 hardware sensor. Processes and analyzes the data with AI explanation.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "heartRate": 78,
      "spo2": 98,
      "temperature": 36.8
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response time is less than 5000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });
      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });
      pm.test("Response has a 'message' field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });
      pm.test("'message' equals 'Data received'", function () {
          const json = pm.response.json();
          pm.expect(json.message).to.eql("Data received");
      });