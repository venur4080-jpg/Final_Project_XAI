$kind: http-request
name: 'Get LIME Explanation (HTML)'
method: GET
url: '{{baseUrl}}/api/xai/lime'
order: 1000
description: Returns the LIME explanation as an HTML file.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 404", function () {
          pm.expect([200, 404]).to.include(pm.response.code);
      });
      pm.test("Response time is less than 3000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });
      if (pm.response.code === 200) {
          pm.test("Response has content-type containing 'text/html'", function () {
              const contentType = pm.response.headers.get("Content-Type") || "";
              pm.expect(contentType).to.include("text/html");
          });
      }